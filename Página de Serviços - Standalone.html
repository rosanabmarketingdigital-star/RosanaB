  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

E26; font-family:'Work Sans',sans-serif; width:100%; overflow-x:hidden;\">\n\n  <!-- NAV -->\n  <div style=\"position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between; padding:20px 48px; background:rgba(251,246,239,0.9); backdrop-filter:blur(8px); border-bottom:1px solid rgba(58,46,38,0.1);\">\n    <div style=\"font-family:'Newsreader',serif; font-size:22px; letter-spacing:0.02em; font-weight:500;\">{{ brandName }}<\u002Fdiv>\n    <div style=\"display:flex; gap:28px; align-items:center;\" class=\"__navlinks\">\n      <a href=\"#servico-1\" style=\"color:#3A2E26; text-decoration:none; font-size:14px; opacity:0.75;\">Diagnóstico<\u002Fa>\n      <a href=\"#servico-2\" style=\"color:#3A2E26; text-decoration:none; font-size:14px; opacity:0.75;\">Consultoria PEC<\u002Fa>\n      <a href=\"#servico-3\" style=\"color:#3A2E26; text-decoration:none; font-size:14px; opacity:0.75;\">Cronograma<\u002Fa>\n      <a href=\"#servico-4\" style=\"color:#3A2E26; text-decoration:none; font-size:14px; opacity:0.75;\">Combo<\u002Fa>\n      <a href=\"{{ whatsappLink }}\" target=\"_blank\" style=\"background:#B5673D; color:#FBF6EF; text-decoration:none; font-size:14px; padding:10px 20px; border-radius:2px; letter-spacing:0.02em;\" style-hover=\"background:#9C562F;\">Falar no WhatsApp<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- HERO -->\n  <section style=\"padding:140px 48px 120px; max-width:1000px; margin:0 auto; text-align:center;\">\n    <div style=\"font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:#B5673D; margin-bottom:28px;\">Estratégia de conteúdo &amp; Instagram<\u002Fdiv>\n    <h1 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:clamp(40px,6vw,76px); line-height:1.08; margin:0 0 32px; letter-spacing:-0.01em;\">Transformo seu Instagram em uma vitrine estratégica que atrai, conecta e vende.<\u002Fh1>\n    <p style=\"font-size:19px; line-height:1.7; color:#5C4A3C; max-width:640px; margin:0 auto 44px;\">Da clareza de posicionamento à execução do conteúdo — um caminho estruturado para sair da insegurança na comunicação e chegar a um perfil que gera clientes com previsibilidade.<\u002Fp>\n    <a href=\"{{ whatsappLink }}\" target=\"_blank\" style=\"display:inline-block; background:#3A2E26; color:#FBF6EF; text-decoration:none; padding:18px 38px; font-size:15px; letter-spacing:0.03em; border-radius:2px;\" style-hover=\"background:#B5673D;\">Agendar conversa<\u002Fa>\n  <\u002Fsection>\n\n  <!-- PONTO A -> PONTO B -->\n  <section style=\"background:#F1E6D8; padding:100px 48px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <div style=\"text-align:center; margin-bottom:64px;\">\n        <div style=\"font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:#B5673D; margin-bottom:20px;\">A metodologia<\u002Fdiv>\n        <h2 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:clamp(32px,4vw,48px); margin:0; line-height:1.15;\">Do diagnóstico ao resultado, em quatro pilares<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr auto 1fr; gap:48px; align-items:start;\">\n        <div style=\"background:#FBF6EF; padding:40px; border-radius:2px;\">\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#9C8570; margin-bottom:18px;\">PONTO A — ONDE VOCÊ PODE ESTÁ<\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.8; color:#5C4A3C; margin:0;\">Perfil bonito, mas sem clareza, posicionamento ou clientes. Insegurança para comunicar o valor do seu trabalho.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; justify-content:center; height:100%; padding-top:40px;\">\n          <div style=\"font-family:'Newsreader',serif; font-style:italic; font-size:28px; color:#B5673D;\">→<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#3A2E26; padding:40px; border-radius:2px;\">\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#D8A97C; margin-bottom:18px;\">PONTO B — ONDE DESEJA CHEGAR<\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.8; color:#EFE3D3; margin:0;\">Comunicação clara, posicionamento forte e um perfil que atrai os clientes certos com previsibilidade.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:rgba(58,46,38,0.12); margin-top:64px; border-radius:2px; overflow:hidden;\">\n        <sc-for list=\"{{ pillars }}\" as=\"p\" hint-placeholder-count=\"4\">\n          <div style=\"background:#F1E6D8; padding:36px 28px;\">\n            <div style=\"font-family:'Newsreader',serif; font-size:32px; color:#B5673D; margin-bottom:16px;\">{{ p.num }}<\u002Fdiv>\n            <div style=\"font-size:17px; font-weight:600; margin-bottom:10px; line-height:1.3;\">{{ p.title }}<\u002Fdiv>\n            <div style=\"font-size:14px; line-height:1.6; color:#6B5A4A;\">{{ p.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SERVICES INTRO -->\n  <section style=\"padding:100px 48px 40px; max-width:800px; margin:0 auto; text-align:center;\">\n    <div style=\"font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:#B5673D; margin-bottom:20px;\">O que ofereço<\u002Fdiv>\n    <h2 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:clamp(32px,4vw,46px); margin:0 0 20px; line-height:1.15;\">Quatro caminhos, um mesmo destino<\u002Fh2>\n    <p style=\"font-size:17px; line-height:1.7; color:#5C4A3C; margin:0;\">Escolha o ponto de partida de acordo com o que você já resolveu e o que ainda falta construir.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- SERVICE 1 -->\n  <section id=\"servico-1\" style=\"padding:60px 48px 100px; max-width:1080px; margin:0 auto; scroll-margin-top:90px;\">\n    <div style=\"display:flex; align-items:baseline; gap:18px; m
